<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hotel Atlas — Luxury Hotel Brand Destinations</title>
<style>
  :root{
    --bg:#0a0d13; --line:#2a3340;
    --ink:#f4eee2; --muted:#a9a293; --accent:#caa44e;
    --shadow:0 12px 44px rgba(0,0,0,.5);
    --sans:'Segoe UI',Roboto,-apple-system,system-ui,Helvetica,Arial,sans-serif;
    --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow:hidden}
  #map{position:absolute;left:0;right:0;bottom:0;top:64px;background:#0a0d13;z-index:1;border:0}
  .topbar{position:absolute;top:0;left:0;right:0;height:64px;z-index:1000;display:flex;align-items:center;gap:14px;padding:10px 18px;background:linear-gradient(180deg,#070a0f,#0a0d13);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:13px}
  .topbar h1{font-family:var(--serif);font-size:23px;margin:0;letter-spacing:.4px;font-weight:600;line-height:1}
  .topbar h1 span{color:var(--accent)}
  .topbar h1 a.bev{color:inherit;text-decoration:none;transition:.15s}
  .topbar h1 a.bev:hover{color:var(--accent)}
  .topbar p{margin:3px 0 0;font-size:12px;color:var(--muted)}
  .logochip{background:#fff;border-radius:11px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.25)}
  .logochip img{display:block;object-fit:contain}
  .logochip.mark{height:46px;padding:3px 7px}
  .logochip.mark img{height:40px;max-width:170px}
  .logochip.ata{height:40px;padding:3px 6px}
  .logochip.ata img{height:34px;max-width:140px}
  .partner{margin-left:auto;display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--muted);transition:.15s}
  .partner:hover{color:var(--ink)}
  .partner span{font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:600;white-space:nowrap}
  @media (max-width:640px){
    .topbar{height:58px;padding:8px 12px;gap:10px}
    #map{top:58px}
    .topbar h1{font-size:18px}
    .topbar p{display:none}
    .partner span{display:none}
    .logochip.mark{height:40px}
    .logochip.mark img{height:30px;max-width:120px}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <a class="logochip mark" href="https://www.expeditionbucketlist.com" target="_blank" rel="noopener"><img src="https://images.squarespace-cdn.com/content/57d86bcd46c3c49c625850a1/54c90494-d588-412d-9643-5d5650d856fd/ebl+2026+Gemini.png?content-type=image%2Fpng" alt="Expedition Bucket List"></a>
    <div>
      <h1>Hotel <span>Atlas</span><a class="bev" href="https://bevvip.com" target="_blank" rel="noopener"> - BeVvip.com</a></h1>
      <p>Explore luxury hotel brand destinations around the world &middot; tap a pin to learn more</p>
    </div>
  </div>
  <a class="partner" href="https://www.aspentraveladvisors.com" target="_blank" rel="noopener">
    <span>Curated&nbsp;by</span>
    <div class="logochip ata"><img src="https://images.squarespace-cdn.com/content/v1/57d86bcd46c3c49c625850a1/8c7b524b-9951-4a51-aaf2-44982357ccfe/ATA+logo+clear+2025+black.png?format=750w" alt="Aspen Travel Advisors"></div>
  </a>
</div>
<iframe id="map" src="https://www.google.com/maps/d/embed?mid=1XIKCkkvm_uiUFJ-u9HLF2irnh5kOGjU&hl=en-US&ehbc=2E312F" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Hotel Atlas map"></iframe>
</body>
</html>
